<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bioart Lab</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #050505;
      font-family: "Nunito", Arial, sans-serif;
    }

    .hero {
      position: relative;
      height: 90vh;
      min-height: 520px;
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: contrast(1.08) saturate(1.15) brightness(0.75);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 40%, rgba(255, 0, 150, 0.28), transparent 32%),
        radial-gradient(circle at 70% 60%, rgba(57, 255, 20, 0.18), transparent 35%),
        rgba(0, 0, 0, 0.35);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
    }

    .hero-content h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #f7f7f7;
      text-transform: uppercase;
      text-shadow:
        0 0 8px rgba(255, 0, 150, 0.8),
        0 0 18px rgba(57, 255, 20, 0.45),
        0 0 36px rgba(255, 0, 150, 0.35);
    }

    .hero-content p {
      margin-top: 1rem;
      font-size: clamp(0.9rem, 2vw, 1.25rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #e8e8e8;
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
    }
.current-section {
  padding: 5rem 6vw;
  background:
    radial-gradient(circle at 85% 20%, rgba(255, 0, 150, 0.13), transparent 28%),
    radial-gradient(circle at 10% 80%, rgba(57, 255, 20, 0.10), transparent 30%),
    #050505;
  color: #f4f4f4;
}

.current-header {
  max-width: 850px;
  margin: 0 auto 3rem;
  text-align: center;
}

.eyebrow {
  margin: 0 0 0.75rem;
  font-size: 0.8rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #39ff14;
  text-shadow: 0 0 12px rgba(57, 255, 20, 0.65);
}

.current-header h2 {
  margin: 0;
  font-size: clamp(2rem, 5vw, 4rem);
  line-height: 1;
  text-transform: uppercase;
  color: #f7f7f7;
}

.current-intro {
  max-width: 620px;
  margin: 1.25rem auto 0;
  font-size: 1rem;
  line-height: 1.7;
  color: rgba(244, 244, 244, 0.78);
}

.current-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.25rem;
  max-width: 1100px;
  margin: 0 auto;
}

.current-card {
  position: relative;
  display: block;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  border-radius: 28px;
  background: #111;
  text-decoration: none;
}

.current-card img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  filter: contrast(1.08) saturate(1.12) brightness(0.85);
}

.current-card-text {
  position: absolute;
  left: 1rem;
  bottom: 1rem;
  z-index: 2;
}

.current-card-text span {
  display: inline-block;
  padding: 0.55rem 0.8rem;
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.6);
  color: #f7f7f7;
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.instagram-link {
  text-align: center;
  margin-top: 2.5rem;
}

.instagram-link a {
  color: #ff4fd8;
  text-decoration: none;
  font-size: 0.9rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
    @media (max-width: 700px) {
      .current-section {
  padding: 4rem 1.2rem;
}

.current-grid {
  grid-template-columns: 1fr;
}

.current-card {
  border-radius: 22px;
}
      .hero {
        height: 80vh;
        min-height: 440px;
      }

      .hero-content p {
        letter-spacing: 0.1em;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <video class="hero-video" autoplay muted loop playsinline>
      <source src="assets/videos/hero-bioart.mp4" type="video/mp4">
    </video>

    <div class="hero-overlay"></div>

    <div class="hero-content">
      <h1>BIOART LAB</h1>
      <p>art • biology • electronics</p>
    </div>
  </section>
  
<section class="current-section">
  <div class="current-header">
    <p class="eyebrow">currently active</p>
    <h2>process, experiments, and field notes</h2>
    <p class="current-intro">
      Recent biomaterial studies, bioelectronics experiments, and works-in-progress from Bioart Lab.
    </p>
  </div>

  <div class="current-grid">

    <a class="current-card" href="https://www.instagram.com/bio.art.lab" target="_blank">
      <img src="assets/images/current/bioyarnsamples.jpg" alt="Algae-based bioyarn process">
      <div class="current-card-text">
        <span>bioyarn study</span>
      </div>
    </a>

    <a class="current-card" href="https://www.instagram.com/bio.art.lab" target="_blank">
      <img src="assets/images/current/myceliumbear.jpg" alt="Mycelium sculpture experimentation">
      <div class="current-card-text">
        <span>mycelium sculpture</span>
      </div>
    </a>

    <a class="current-card" href="https://www.instagram.com/bio.art.lab" target="_blank">
      <img src="assets/images/current/bioplasticsamples.jpg" alt="Bioplastic samples">
      <div class="current-card-text">
        <span>bioplastics</span>
      </div>
    </a>

  </div>

  <div class="instagram-link">
    <a href="https://www.instagram.com/bio.art.lab" target="_blank">
      more process on instagram →
    </a>
  </div>
</section>
  
</body>
</html>
