<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bioart Lab</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #050505;
      font-family: "Nunito", Arial, sans-serif;
    }

    .hero {
      position: relative;
      height: 90vh;
      min-height: 520px;
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: contrast(1.08) saturate(1.15) brightness(0.75);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 40%, rgba(255, 0, 150, 0.28), transparent 32%),
        radial-gradient(circle at 70% 60%, rgba(57, 255, 20, 0.18), transparent 35%),
        rgba(0, 0, 0, 0.35);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
    }

    .hero-content h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #f7f7f7;
      text-transform: uppercase;
      text-shadow:
        0 0 8px rgba(255, 0, 150, 0.8),
        0 0 18px rgba(57, 255, 20, 0.45),
        0 0 36px rgba(255, 0, 150, 0.35);
    }

    .hero-content p {
      margin-top: 1rem;
      font-size: clamp(0.9rem, 2vw, 1.25rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #e8e8e8;
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
    }

    @media (max-width: 700px) {
      .hero {
        height: 80vh;
        min-height: 440px;
      }

      .hero-content p {
        letter-spacing: 0.1em;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <video class="hero-video" autoplay muted loop playsinline>
      <source src="assets/videos/hero-bioart.mp4" type="video/mp4">
    </video>

    <div class="hero-overlay"></div>

    <div class="hero-content">
      <h1>BIOART LAB</h1>
      <p>living systems • materials • electronics</p>
    </div>
  </section>

</body>
</html>
