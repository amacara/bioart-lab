      background: #ffffffcc;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 0 20px #05ff1a66;
    }

    .project-highlight p {
      font-size: 1.2rem;
      color: #222;
    }

    .project-highlight a {
      font-weight: bold;
